name: "Opale Pay - Infrastructure GitOps"

on:
  push:
    branches:
      - main
    paths:
      - 'infra-pay/**'
      - 'scripts/**'
      - '.github/workflows/infra-deploy-pay.yml'
  workflow_dispatch:

jobs:
  terraform:
    name: "Automated Deployment (Infomaniak Cloud)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Preflight required secrets
        env:
          ADMIN_CIDR: ${{ secrets.OPALE_PAY_ADMIN_CIDR }}
          PAY_ALLOWED_CIDR: ${{ secrets.OPALE_PAY_ALLOWED_CIDR }}
          SSH_PUBLIC_KEY: ${{ secrets.OPALE_PAY_SSH_PUBLIC_KEY }}
        run: |
          test -n "$ADMIN_CIDR" || { echo "Missing required secret: OPALE_PAY_ADMIN_CIDR"; exit 1; }
          test -n "$PAY_ALLOWED_CIDR" || { echo "Missing required secret: OPALE_PAY_ALLOWED_CIDR"; exit 1; }
          test -n "$SSH_PUBLIC_KEY" || { echo "Missing required secret: OPALE_PAY_SSH_PUBLIC_KEY"; exit 1; }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
        run: |
          terraform init \
            -backend-config="endpoint=https://s3.pub2.infomaniak.cloud" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="force_path_style=true"
        working-directory: ./infra-pay

      - name: Terraform Plan
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ secrets.OS_PROJECT_DOMAIN_NAME }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_REGION_NAME: ${{ secrets.OS_REGION_NAME }}
          OS_IDENTITY_API_VERSION: "3"
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.OPALE_PAY_SSH_PUBLIC_KEY }}
          TF_VAR_admin_cidr: ${{ secrets.OPALE_PAY_ADMIN_CIDR }}
          TF_VAR_pay_allowed_cidr: ${{ secrets.OPALE_PAY_ALLOWED_CIDR }}
          TF_VAR_bootstrap_cidr: ""
        run: terraform plan
        working-directory: ./infra-pay

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ secrets.OS_PROJECT_DOMAIN_NAME }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_REGION_NAME: ${{ secrets.OS_REGION_NAME }}
          OS_IDENTITY_API_VERSION: "3"
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.OPALE_PAY_SSH_PUBLIC_KEY }}
          TF_VAR_admin_cidr: ${{ secrets.OPALE_PAY_ADMIN_CIDR }}
          TF_VAR_pay_allowed_cidr: ${{ secrets.OPALE_PAY_ALLOWED_CIDR }}
          TF_VAR_bootstrap_cidr: ""
        run: terraform apply -auto-approve
        working-directory: ./infra-pay

      - name: Summarize backend bootstrap
        run: |
          echo "Opale Pay backend VM provisioned."
          echo "Fill /opt/opale-pay/deploy.env and run /usr/local/bin/opale-pay-sync on the VM."
