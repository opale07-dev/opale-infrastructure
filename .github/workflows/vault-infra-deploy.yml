name: "Vault / Infrastructure Deploy"

on:
  repository_dispatch:
    types:
      - vault-image-published
  push:
    branches:
      - main
    paths:
      - 'infra-vault/**'
      - 'scripts/**'
      - '.github/workflows/vault-infra-deploy.yml'
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Optional immutable GHCR image ref to deploy, e.g. ghcr.io/opale07-dev/opale-vault@sha256:..."
        required: false
        default: ""

env:
  VAULT_OPENSTACK_REGION: dc4-a

jobs:
  terraform:
    name: "Automated Deployment (Infomaniak Cloud)"
    runs-on: ubuntu-latest
    outputs:
      ip: ${{ steps.target.outputs.ip }}
      ssh_port: ${{ steps.target.outputs.ssh_port }}
      ssh_user: ${{ steps.target.outputs.ssh_user }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Preflight required secrets
        env:
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
          VAULT_ALLOWED_CIDR: ${{ secrets.VAULT_ALLOWED_CIDR }}
          SSH_PUBLIC_KEY: ${{ secrets.VAULT_SSH_PUBLIC_KEY }}
          OPALE_GLOBAL_PAT: ${{ secrets.OPALE_GLOBAL_PAT }}
        run: |
          test -n "$ADMIN_CIDR" || { echo "Missing required secret: ADMIN_CIDR"; exit 1; }
          test -n "$VAULT_ALLOWED_CIDR" || { echo "Missing required secret: VAULT_ALLOWED_CIDR"; exit 1; }
          test -n "$SSH_PUBLIC_KEY" || { echo "Missing required secret: SSH_PUBLIC_KEY"; exit 1; }
          test -n "$OPALE_GLOBAL_PAT" || { echo "Missing required secret: OPALE_GLOBAL_PAT"; exit 1; }

      - name: Install OpenStack Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-openstackclient > /dev/null

      # Le vTPM est OBLIGATOIRE pour le Vault et n'existe que dans dc4-a chez
      # Infomaniak. Le workflow force cette region pour Terraform et valide
      # les APIs projet OpenStack avant tout plan/apply, sans droit admin Keystone.
      - name: Validate OpenStack target region
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ secrets.OS_PROJECT_DOMAIN_NAME }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_REGION_NAME: ${{ env.VAULT_OPENSTACK_REGION }}
          OS_IDENTITY_API_VERSION: "3"
        run: |
          set -euo pipefail
          openstack token issue -f value -c id >/dev/null
          openstack server list -f value -c ID >/dev/null
          openstack image list -f value -c ID >/dev/null
          openstack network list -f value -c ID >/dev/null
          echo "OpenStack APIs accessibles pour $OS_REGION_NAME (compute/image/network)."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
        run: |
          terraform init \
            -backend-config="endpoint=https://s3.pub2.infomaniak.cloud" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="force_path_style=true"
        working-directory: ./infra-vault

      - name: Terraform Plan
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ secrets.OS_PROJECT_DOMAIN_NAME }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_REGION_NAME: ${{ env.VAULT_OPENSTACK_REGION }}
          OS_IDENTITY_API_VERSION: "3"
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.VAULT_SSH_PUBLIC_KEY }}
          TF_VAR_admin_cidr: ${{ secrets.ADMIN_CIDR }}
          TF_VAR_vault_allowed_cidr: ${{ secrets.VAULT_ALLOWED_CIDR }}
          TF_VAR_bootstrap_cidr: ""
        run: terraform plan
        working-directory: ./infra-vault

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ secrets.OS_PROJECT_DOMAIN_NAME }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_REGION_NAME: ${{ env.VAULT_OPENSTACK_REGION }}
          OS_IDENTITY_API_VERSION: "3"
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.VAULT_SSH_PUBLIC_KEY }}
          TF_VAR_admin_cidr: ${{ secrets.ADMIN_CIDR }}
          TF_VAR_vault_allowed_cidr: ${{ secrets.VAULT_ALLOWED_CIDR }}
          TF_VAR_bootstrap_cidr: ""
        run: terraform apply -auto-approve
        working-directory: ./infra-vault

      - name: Get deployment target outputs from Terraform
        if: github.ref == 'refs/heads/main'
        id: target
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
        run: |
          IP_ADDRESS=$(terraform output -json instance_ip | jq -r '.')
          echo "ip=$IP_ADDRESS" >> $GITHUB_OUTPUT
          echo "ssh_port=$(terraform output -json ssh_port | jq -r '.')" >> "$GITHUB_OUTPUT"
          echo "ssh_user=ubuntu" >> "$GITHUB_OUTPUT"
        working-directory: ./infra-vault

      - name: Summarize backend bootstrap
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Vault backend VM provisioned at ${{ steps.target.outputs.ip }}"
          echo "Application deployment is handled here by opale-infrastructure when an immutable GHCR image_ref is provided."

  deploy-container:
    name: "Deploy selected Vault image"
    runs-on: ubuntu-latest
    needs: terraform
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && inputs.image_ref != '') ||
        (github.event_name == 'repository_dispatch' && github.event.client_payload.image_ref != '')
      }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve image ref
        id: image
        env:
          DISPATCH_IMAGE_REF: ${{ github.event.client_payload.image_ref }}
          INPUT_IMAGE_REF: ${{ inputs.image_ref }}
        run: |
          set -euo pipefail
          IMAGE_REF="${INPUT_IMAGE_REF:-$DISPATCH_IMAGE_REF}"
          case "$IMAGE_REF" in
            ghcr.io/*@sha256:*) ;;
            *) echo "image_ref must be an immutable GHCR digest"; exit 1 ;;
          esac
          echo "ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Preflight deploy secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VAULT_SSH_PRIVATE_KEY }}
          GHCR_USER: ${{ secrets.OPALE_GHCR_READ_USER }}
          GHCR_TOKEN: ${{ secrets.OPALE_GHCR_READ_TOKEN }}
        run: |
          test -n "$SSH_PRIVATE_KEY" || { echo "Missing required secret: VAULT_SSH_PRIVATE_KEY"; exit 1; }
          test -n "$GHCR_USER" || { echo "Missing required secret: OPALE_GHCR_READ_USER"; exit 1; }
          test -n "$GHCR_TOKEN" || { echo "Missing required secret: OPALE_GHCR_READ_TOKEN"; exit 1; }

      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VAULT_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/opale_vault
          chmod 600 ~/.ssh/opale_vault

      - name: Resolve runner SSH CIDR
        id: runner_ssh_cidr
        run: |
          set -euo pipefail
          echo "cidr=$(curl -fsS https://api.ipify.org)/32" >> "$GITHUB_OUTPUT"

      - name: Install OpenStack Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-openstackclient > /dev/null

      - name: Open temporary SSH access from runner
        id: ssh_rule
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ secrets.OS_PROJECT_DOMAIN_NAME }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_REGION_NAME: ${{ env.VAULT_OPENSTACK_REGION }}
          OS_IDENTITY_API_VERSION: "3"
          SSH_PORT: ${{ needs.terraform.outputs.ssh_port }}
          RUNNER_CIDR: ${{ steps.runner_ssh_cidr.outputs.cidr }}
        run: |
          set -euo pipefail
          RULE_ID=$(openstack security group rule create opale-vault-secgroup \
            --protocol tcp \
            --dst-port "${SSH_PORT}:${SSH_PORT}" \
            --remote-ip "$RUNNER_CIDR" \
            -f value -c id)
          echo "id=$RULE_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy Vault container
        env:
          GHCR_USER: ${{ secrets.OPALE_GHCR_READ_USER }}
          GHCR_TOKEN: ${{ secrets.OPALE_GHCR_READ_TOKEN }}
        run: |
          set -euo pipefail
          scripts/deploy-ghcr-container.sh \
            --service-name opale-vault \
            --image-ref '${{ steps.image.outputs.ref }}' \
            --target-ip '${{ needs.terraform.outputs.ip }}' \
            --ssh-user '${{ needs.terraform.outputs.ssh_user }}' \
            --ssh-port '${{ needs.terraform.outputs.ssh_port }}' \
            --ssh-key ~/.ssh/opale_vault \
            --app-dir /opt/opale-vault \
            --host-port 8443 \
            --container-port 8443 \
            --health-url https://127.0.0.1:8443/api/health \
            --health-expect '"status":"ok"'

      - name: Close temporary SSH access from runner
        if: always() && steps.ssh_rule.outputs.id != ''
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ secrets.OS_PROJECT_DOMAIN_NAME }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_REGION_NAME: ${{ env.VAULT_OPENSTACK_REGION }}
          OS_IDENTITY_API_VERSION: "3"
          RULE_ID: ${{ steps.ssh_rule.outputs.id }}
        run: |
          set -euo pipefail
          openstack security group rule delete "$RULE_ID" || true
