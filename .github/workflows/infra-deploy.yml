name: "Opale Core - Infrastructure GitOps"

on:
  push:
    branches:
      - main
    paths:
      - 'infra-vault/**'
      - 'scripts/**'
      - '.github/workflows/infra-deploy.yml'
  workflow_dispatch:
    inputs:
      confirm_replace:
        description: "Type opale-vault-prod to APPLY (create or REPLACE the Vault VM). Replacing destroys the TPM-sealed master key: verify backups first. Empty = plan only."
        required: false
        default: ""
        type: string

jobs:
  terraform:
    name: "Automated Deployment (Infomaniak Cloud)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Preflight required secrets
        env:
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
          VAULT_ALLOWED_CIDR: ${{ secrets.VAULT_ALLOWED_CIDR }}
          SSH_PUBLIC_KEY: ${{ secrets.VAULT_SSH_PUBLIC_KEY }}
          OPALE_GLOBAL_PAT: ${{ secrets.OPALE_GLOBAL_PAT }}
        run: |
          test -n "$ADMIN_CIDR" || { echo "Missing required secret: ADMIN_CIDR"; exit 1; }
          test -n "$VAULT_ALLOWED_CIDR" || { echo "Missing required secret: VAULT_ALLOWED_CIDR"; exit 1; }
          test -n "$SSH_PUBLIC_KEY" || { echo "Missing required secret: SSH_PUBLIC_KEY"; exit 1; }
          test -n "$OPALE_GLOBAL_PAT" || { echo "Missing required secret: OPALE_GLOBAL_PAT"; exit 1; }

      # Le vTPM est OBLIGATOIRE pour le Vault et n'existe que dans dc4-a chez
      # Infomaniak. On refuse toute action Terraform hors de cette region.
      - name: Enforce vTPM region (dc4-a)
        env:
          OS_REGION_NAME: ${{ secrets.OS_REGION_NAME }}
        run: |
          if [ "$OS_REGION_NAME" != "dc4-a" ]; then
            echo "ERREUR: le vTPM exige la region dc4-a; la region configuree est differente."
            echo "Migrer le projet/les credentials OpenStack vers dc4-a avant tout deploiement Vault."
            exit 1
          fi
          echo "Region dc4-a confirmee: vTPM disponible."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
        run: |
          terraform init \
            -backend-config="endpoint=https://s3.pub2.infomaniak.cloud" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="force_path_style=true"
        working-directory: ./infra-vault

      - name: Terraform Plan
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ secrets.OS_PROJECT_DOMAIN_NAME }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_REGION_NAME: ${{ secrets.OS_REGION_NAME }}
          OS_IDENTITY_API_VERSION: "3"
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.VAULT_SSH_PUBLIC_KEY }}
          TF_VAR_admin_cidr: ${{ secrets.ADMIN_CIDR }}
          TF_VAR_vault_allowed_cidr: ${{ secrets.VAULT_ALLOWED_CIDR }}
          TF_VAR_bootstrap_cidr: ""
        run: terraform plan
        working-directory: ./infra-vault

      # L'apply est volontairement manuel : la VM Vault détient une clé maître
      # scellée dans son vTPM, un remplacement implicite sur push serait destructif.
      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_replace == 'opale-vault-prod'
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ secrets.OS_PROJECT_DOMAIN_NAME }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_REGION_NAME: ${{ secrets.OS_REGION_NAME }}
          OS_IDENTITY_API_VERSION: "3"
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.VAULT_SSH_PUBLIC_KEY }}
          TF_VAR_admin_cidr: ${{ secrets.ADMIN_CIDR }}
          TF_VAR_vault_allowed_cidr: ${{ secrets.VAULT_ALLOWED_CIDR }}
          TF_VAR_bootstrap_cidr: ""
        run: terraform apply -auto-approve
        working-directory: ./infra-vault

      - name: Get Instance IP from Terraform
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_replace == 'opale-vault-prod'
        id: get_ip
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.INFOMANIAK_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFOMANIAK_S3_SECRET_KEY }}
        run: |
          IP_ADDRESS=$(terraform output -json instance_ip | jq -r '.')
          echo "ip=$IP_ADDRESS" >> $GITHUB_OUTPUT
        working-directory: ./infra-vault

      - name: Publish backend target to opale-core
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_replace == 'opale-vault-prod'
        env:
          GH_TOKEN: ${{ secrets.OPALE_GLOBAL_PAT }}
          BACKEND_IP: ${{ steps.get_ip.outputs.ip }}
        run: |
          set -euo pipefail
          test -n "$BACKEND_IP" || { echo "Missing Terraform output: instance_ip"; exit 1; }
          gh secret set PRODUCTION_VPS_IP --repo opale07-dev/opale-core --body "$BACKEND_IP"
          gh secret set VAULT_BACKEND_URL --repo opale07-dev/opale-core --body "https://${BACKEND_IP}:8443"

      - name: Summarize backend bootstrap
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_replace == 'opale-vault-prod'
        run: |
          echo "Vault backend VM provisioned at ${{ steps.get_ip.outputs.ip }}"
          echo "Backend bootstrap/deploy is handled by opale-core."

      - name: Summarize plan-only run
        if: github.event_name == 'push' || github.event.inputs.confirm_replace != 'opale-vault-prod'
        run: |
          echo "Plan-only run: no apply performed."
          echo "To create/replace the Vault VM, dispatch this workflow with confirm_replace=opale-vault-prod."
